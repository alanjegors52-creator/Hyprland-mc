"$schema" = 'https://starship.rs/config-schema.json'

format = """
[вЦСвЦТвЦУ](#49fa0a)\
[ у∞Н≥ ](bg:#3fe002 fg:#090c0c)\
[оВі](bg:#1f7000 fg:#3fe002)\
$directory\
[оВі](fg:#1f7000 bg:#0e3002)\
$git_branch\
$git_status\
[оВі](fg:#0e3002 bg:#071701)\
$nodejs\
$rust\
$golang\
$php\
[оВі](fg:#071701 bg:#365c28)\
$time\
[оВі ](fg:#365c28)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#1f7000"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#16380a"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#16380a"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:#092101"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:#092101"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оШІ"
style = "bg:#092101"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оШИ"
style = "bg:#092101"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = true
time_format = "%R" # Hour:Minute Format
style = "bg:#365c28"
format = '[[ пРЇ $time ](fg:#a0a9cb bg:#1d2230)]($style)'
